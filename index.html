<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clientes Zonificados · Laucirica Transmisiones</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1e3c;--navy2:#1a3060;--blue:#1e5fa8;--blue-lt:#dbeafe;
  --accent:#e07b2a;--accent-lt:#fef3e2;
  --green:#15803d;--green-lt:#dcfce7;
  --red:#8b1a1a;--red-lt:#fdecea;
  --bg:#f2f4f8;--white:#fff;--border:#e2e6ed;
  --txt:#1a202c;--muted:#64748b;--muted2:#94a3b8;
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow-lg:0 10px 40px rgba(0,0,0,.15);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* ── HEADER ── */
.hdr{background:var(--navy);height:56px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--accent);flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white}
.hdr-title{font-size:14px;font-weight:600;color:white}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);background:rgba(224,123,42,.15);padding:3px 10px;border-radius:20px;border:1px solid rgba(224,123,42,.25)}

/* ── TOOLBAR ── */
.toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:.6rem 1.5rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap;box-shadow:var(--shadow);flex-shrink:0}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted2);pointer-events:none}
.search{width:100%;padding:7px 12px 7px 34px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;color:var(--txt);outline:none;transition:border-color .15s}
.search:focus{border-color:var(--blue);background:white}
.sel{padding:7px 10px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;color:var(--txt);cursor:pointer;outline:none;min-width:130px}
.sel:focus{border-color:var(--blue)}
.view-toggle{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.vbtn{padding:6px 14px;background:var(--white);border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
.vbtn.active{background:var(--navy);color:white}
.res-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
.btn{padding:7px 14px;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-accent{background:var(--accent);color:white}.btn-accent:hover{background:#c96b1a}
.btn-ghost{background:var(--bg);color:var(--muted);border:1.5px solid var(--border)}.btn-ghost:hover{color:var(--txt)}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.content{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:200px;min-width:200px;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sb-section{padding:.75rem .75rem .25rem}
.sb-label{font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.sb-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:6px 10px;border-radius:7px;border:none;background:none;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;font-size:12px;color:var(--muted);margin-bottom:2px;transition:all .15s}
.sb-btn:hover{background:var(--bg);color:var(--txt)}
.sb-btn.active{background:var(--navy);color:white;font-weight:500}
.sb-btn .sb-n{font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(0,0,0,.07);padding:1px 6px;border-radius:10px}
.sb-btn.active .sb-n{background:rgba(255,255,255,.2);color:white}
.sb-divider{height:1px;background:var(--border);margin:.5rem .75rem}
.comarca-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:5px 10px 5px 18px;border-radius:6px;border:none;background:none;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;font-size:11px;color:var(--muted);margin-bottom:1px;transition:all .15s}
.comarca-btn:hover{background:var(--bg);color:var(--txt)}
.comarca-btn.active{background:var(--blue-lt);color:var(--blue);font-weight:500}
.comarca-btn .sb-n{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2)}
.comarca-btn.active .sb-n{color:var(--blue)}
.prov-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}

/* ── TABLE PANE ── */
.table-pane{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.tbl-wrap{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--navy);color:rgba(255,255,255,.8);font-weight:500;padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:2px solid var(--accent)}
thead th:hover{color:white}
thead th.sort-asc::after{content:" ↑"}
thead th.sort-desc::after{content:" ↓"}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8faff}
.c-name{font-weight:600;color:var(--navy);font-size:13px}
.c-prov{display:inline-flex;align-items:center;gap:4px;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-top:3px}
.c-comarca{font-size:11px;color:var(--muted);margin-top:1px}
.c-tel{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--txt)}
.c-email a{color:var(--blue);text-decoration:none;font-size:12px}
.c-email a:hover{text-decoration:underline}
.c-city{font-size:12px;color:var(--txt)}
.row-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
tbody tr:hover .row-actions{opacity:1}
.ra{padding:4px 8px;border:none;border-radius:5px;font-size:11px;cursor:pointer;font-weight:500;transition:background .15s}
.ra-call{background:var(--green-lt);color:var(--green)}.ra-call:hover{background:#bbf7d0}
.ra-mail{background:var(--blue-lt);color:var(--blue)}.ra-mail:hover{background:#bfdbfe}
.ra-map{background:var(--accent-lt);color:var(--accent)}.ra-map:hover{background:#fed7aa}
.empty-state{padding:4rem;text-align:center;color:var(--muted);font-size:14px}

/* ── PAGER ── */
.pager{display:flex;align-items:center;justify-content:center;gap:4px;padding:.75rem;flex-wrap:wrap}
.pg{padding:5px 10px;background:var(--white);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s}
.pg:hover{border-color:var(--navy);color:var(--navy)}
.pg.active{background:var(--navy);color:white;border-color:var(--navy)}
.pg:disabled{opacity:.4;cursor:not-allowed}
.pg-info{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);padding:0 6px}

/* ── MAP PANE ── */
.map-pane{width:420px;min-width:420px;border-left:1px solid var(--border);display:none;flex-direction:column;background:var(--white)}
.map-pane.visible{display:flex}
#leaflet-map{flex:1;min-height:0}
.map-sidebar{height:200px;overflow-y:auto;border-top:1px solid var(--border)}
.map-item{padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.map-item:hover,.map-item.active{background:var(--blue-lt)}
.map-item-name{font-size:12px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-item-loc{font-size:11px;color:var(--muted);margin-top:1px}
.map-hint{padding:.6rem .75rem;font-size:11px;color:var(--muted);background:#fffbf5;border-bottom:1px solid var(--border);border-top:1px solid var(--border)}

/* ── LEGEND ── */
.map-legend{position:absolute;bottom:24px;right:10px;z-index:500;background:white;border-radius:8px;padding:8px 10px;box-shadow:var(--shadow-lg);font-size:10px;max-width:140px}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:10px;color:var(--txt)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── POPUP ── */
.leaflet-popup-content{font-family:'Inter',sans-serif;font-size:13px;min-width:200px}
.pop-name{font-weight:700;color:var(--navy);font-size:14px;margin-bottom:6px;line-height:1.3}
.pop-row{font-size:11px;color:var(--muted);margin-bottom:3px}
.pop-row strong{color:var(--txt)}
.pop-tag{display:inline-flex;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-bottom:6px}
.pop-btn{margin-top:8px;padding:5px 12px;background:var(--navy);color:white;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif}

/* ── TOAST ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:10px 22px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1}

/* ── STATS CARDS ── */
.stats-bar{display:flex;gap:10px;padding:.75rem 1.5rem;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.stat-card{display:flex;flex-direction:column;align-items:center;padding:6px 14px;border-radius:8px;background:var(--bg);border:1px solid var(--border);white-space:nowrap;min-width:fit-content;cursor:pointer;transition:all .15s}
.stat-card:hover{border-color:var(--navy)}
.stat-card.active{background:var(--navy);border-color:var(--navy)}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--navy)}
.stat-card.active .stat-val{color:white}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.stat-card.active .stat-lbl{color:rgba(255,255,255,.6)}


  /* ── PROXIMITY SEARCH ── */
  .prox-bar{background:linear-gradient(135deg,#0f1e3c 0%,#1a3060 100%);padding:.75rem 1.5rem;display:flex;gap:10px;align-items:center;flex-wrap:wrap;flex-shrink:0;border-bottom:2px solid var(--accent)}
  .prox-title{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);white-space:nowrap;letter-spacing:.3px}
  .prox-title span{color:var(--accent)}
  .prox-input-wrap{flex:1;min-width:200px;position:relative}
  .prox-input-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4)}
  .prox-input{width:100%;padding:8px 12px 8px 34px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;color:white;outline:none;transition:all .15s}
  .prox-input::placeholder{color:rgba(255,255,255,.35)}
  .prox-input:focus{background:rgba(255,255,255,.15);border-color:var(--accent)}
  .prox-km-wrap{display:flex;align-items:center;gap:6px}
  .prox-km-label{font-size:11px;color:rgba(255,255,255,.55);white-space:nowrap}
  .prox-km{width:70px;padding:8px 10px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;color:white;outline:none;text-align:center}
  .prox-km:focus{border-color:var(--accent)}
  .prox-btn{padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s}
  .prox-btn:hover{background:#c96b1a}
  .prox-clear{padding:8px 12px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
  .prox-clear:hover{background:rgba(255,255,255,.2);color:white}
  .prox-results{display:none;background:#fff8f0;border-bottom:2px solid var(--accent);padding:.6rem 1.5rem;font-size:12px;color:var(--accent);font-weight:500;flex-shrink:0}
  .prox-results.show{display:block}
  .prox-results strong{color:var(--navy)}
  /* Proximity badge on rows */
  .dist-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-left:6px;vertical-align:middle}
  .dist-near{background:#dcfce7;color:#15803d}
  .dist-mid{background:#fef3e2;color:#e07b2a}
  .dist-far{background:#fdecea;color:#8b1a1a}
  /* Origin marker pulse */
  @keyframes ping{0%{transform:scale(1);opacity:1}100%{transform:scale(2.5);opacity:0}}
  .origin-pulse{animation:ping 1.5s ease-out infinite}

@media(max-width:1100px){.map-pane{width:300px;min-width:300px}}
@media(max-width:900px){.sidebar{display:none}.col-comarca{display:none}}
@media(max-width:700px){.map-pane{display:none!important}.col-email{display:none}}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo">LT</div>
      <div>
        <div class="hdr-title">Laucirica · Clientes Zonificados</div>
        <div class="hdr-sub">Distribuidor BEST Gold Bonfiglioli · 16 provincias</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="hdr-count" id="hdr-count">2.064 clientes</div>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search" id="search" placeholder="Buscar empresa, ciudad, email..." oninput="doFilter()">
    </div>
    <select class="sel" id="f-prov" onchange="onProvChange()">
      <option value="">Todas las provincias</option>
      <option value="Alicante">Alicante</option>
            <option value="Asturias">Asturias</option>
            <option value="Barcelona">Barcelona</option>
            <option value="Burgos">Burgos</option>
            <option value="Cantabria">Cantabria</option>
            <option value="Gipuzkoa">Gipuzkoa</option>
            <option value="La Rioja">La Rioja</option>
            <option value="Madrid">Madrid</option>
            <option value="Murcia">Murcia</option>
            <option value="Navarra">Navarra</option>
            <option value="Sevilla">Sevilla</option>
            <option value="Toledo">Toledo</option>
            <option value="Valencia">Valencia</option>
            <option value="Vizcaya">Vizcaya</option>
            <option value="Zaragoza">Zaragoza</option>
            <option value="Álava">Álava</option>
    </select>
    <select class="sel" id="f-comarca" onchange="doFilter()">
      <option value="">Todas las comarcas</option>
    </select>
    <div class="view-toggle">
      <button class="vbtn active" id="btn-list" onclick="setView('list')">☰ Lista</button>
      <button class="vbtn" id="btn-map" onclick="setView('map')">🗺 Mapa</button>
    </div>
    <span class="res-count" id="res-count"></span>
    <button class="btn btn-ghost" onclick="doExport()">⬇ CSV</button>
  </div>


  <!-- PROXIMITY SEARCH BAR -->
  <div class="prox-bar">
    <div class="prox-title">📍 Empresas <span>cercanas</span></div>
    <div class="prox-input-wrap">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="prox-input" id="prox-query" placeholder="Busca un cliente o ciudad de referencia..." 
        oninput="onProxInput()" onkeydown="if(event.key==='Enter')doProxSearch()">
    </div>
    <div class="prox-km-wrap">
      <span class="prox-km-label">Radio:</span>
      <input class="prox-km" id="prox-km" type="number" value="21" min="1" max="200">
      <span class="prox-km-label">km</span>
    </div>
    <button class="prox-btn" onclick="doProxSearch()">🔍 Buscar cercanas</button>
    <button class="prox-clear" id="prox-clear-btn" onclick="clearProx()" style="display:none">✕ Limpiar</button>
  </div>
  <!-- AUTOCOMPLETE DROPDOWN -->
  <div id="prox-dropdown" style="position:relative;z-index:200;flex-shrink:0;display:none">
    <div style="position:absolute;top:0;left:1.5rem;right:1.5rem;background:white;border:1px solid var(--border);border-radius:0 0 10px 10px;box-shadow:var(--shadow-lg);max-height:220px;overflow-y:auto" id="prox-dd-inner"></div>
  </div>
  <!-- PROXIMITY RESULTS BANNER -->
  <div class="prox-results" id="prox-results-bar"></div>

  <!-- CONTENT -->
  <div class="content">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar"></div>

    <!-- TABLE PANE -->
    <div class="table-pane" id="table-pane">
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="doSort(0)">Empresa</th>
              <th onclick="doSort(1)">Teléfono</th>
              <th class="col-email" onclick="doSort(2)">Email</th>
              <th onclick="doSort(3)">Ciudad</th>
              <th class="col-comarca" onclick="doSort(6)">Comarca</th>
              <th style="width:100px"></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty-state" id="empty" style="display:none">Sin resultados</div>
      </div>
      <div class="pager" id="pager"></div>
    </div>

    <!-- MAP PANE -->
    <div class="map-pane" id="map-pane">
      <div id="leaflet-map" style="position:relative"></div>
      <div class="map-hint" id="map-hint">Mueve el mapa para ver empresas de esa zona</div>
      <div class="map-sidebar" id="map-sidebar"></div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

function buildSidebar() {

  let html = '<div class="sb-section"><div class="sb-label">Provincias</div>';
  html += `<button class="sb-btn ${!activeProv?'active':''}" onclick="selectProv('')">

  for (const prov of Object.keys(PROV_COLORS)) {

      <span><span class="prov-dot" style="background:${color}"></span>${prov}</span>

// ── FILTER ─────────────────────────────────────────────────────────────────
function doFilter() {
  const q  = document.getElementById('search').value.trim().toLowerCase();
  const fp = document.getElementById('f-prov').value;
  const fc = document.getElementById('f-comarca').value;

  filtered = D.map((r,i)=>({r,i})).filter(({r}) => {
    if (fp && r[5]!==fp) return false;
    if (fc && r[6]!==fc) return false;
    if (q && !(r[0]+r[1]+r[2]+r[3]+r[5]+r[6]).toLowerCase().includes(q)) return false;
    return true;
  });

  if (sortCol>=0) {
    filtered.sort((a,b)=>{
      const va=a.r[sortCol]||'',vb=b.r[sortCol]||'';
      return sortAsc?va.localeCompare(vb,'es'):vb.localeCompare(va,'es');
    });
  }

  page=0;
  doRender();
  buildStats();
  if (currentView==='map') loadVisibleMarkers();
}

function doSort(col) {
  if (sortCol===col) sortAsc=!sortAsc; else {sortCol=col;sortAsc=true;}
  document.querySelectorAll('thead th').forEach((th,i)=>{
    th.classList.remove('sort-asc','sort-desc');
    if (i===col) th.classList.add(sortAsc?'sort-asc':'sort-desc');
  });
  doFilter();
}

function renderPager() {
  const total = Math.ceil(filtered.length/PAGE_SIZE);
  const p = document.getElementById('pager');
  if (total<=1){p.innerHTML='';return;}
  let b=`<button class="pg" onclick="goPage(${page-1})" ${page===0?'disabled':''}>‹</button>`;
  let s=Math.max(0,page-2),e=Math.min(total-1,page+2);
  if(s>0) b+=`<button class="pg" onclick="goPage(0)">1</button>${s>1?'<span class="pg-info">…</span>':''}`;
  for(let i=s;i<=e;i++) b+=`<button class="pg ${i===page?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
  if(e<total-1) b+=`${e<total-2?'<span class="pg-info">…</span>':''}<button class="pg" onclick="goPage(${total-1})">${total}</button>`;
  b+=`<button class="pg" onclick="goPage(${page+1})" ${page>=total-1?'disabled':''}>›</button>`;
  b+=`<span class="pg-info">${page+1}/${total} · ${filtered.length.toLocaleString('es')}</span>`;
  p.innerHTML=b;
}

function initMap() {
  // Default center: Bilbao (main zone)
  lmap=L.map('leaflet-map').setView([43.26,-2.93],9);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {attribution:'© OpenStreetMap',maxZoom:18}).addTo(lmap);
  lmap.on('moveend zoomend',()=>loadVisibleMarkers());

  // Legend
  const legend = L.control({position:'bottomright'});
  legend.onAdd = ()=>{
    const div=document.createElement('div');
    div.className='map-legend';
    div.innerHTML='<div style="font-weight:600;font-size:10px;color:#444;margin-bottom:4px">Provincias</div>'+
      Object.entries(PROV_COLORS).map(([p,c])=>`<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${p}</div>`).join('');
    return div;
  };
  legend.addTo(lmap);
}

function geocode(city, prov) {
  // Instant lookup from pre-geocoded dictionary (no network needed)
  const key = city.toUpperCase();
  if (GEO[key]) return Promise.resolve(GEO[key]);
  // Fallback: try city without province qualifier
  const clean = key.replace(/[^A-ZÁÉÍÓÚÜÑÀÈÌÒÙÂÊÎÔÛÄËÏÖÜ\s\-]/gi,'').trim();
  for (const [k,v] of Object.entries(GEO)) {
    if (k.startsWith(clean) || clean.startsWith(k)) return Promise.resolve(v);
  }
  return Promise.resolve(null);
}
async function loadVisibleMarkers() {
  if(_loading){_pending=true;return;}
  _loading=true; _pending=false;

  const bounds=lmap.getBounds();

  // Gather unique city+provincia combos from filtered
  const citySet={};
  filtered.forEach(({r})=>{
    const city=r[3]||'',prov=r[5]||'';
    if(!city)return;
    const key=city+'|'+prov;
    if(!citySet[key]) citySet[key]={city,prov,key};
  });

  // Geocode uncached
  const uncached=Object.values(citySet).filter(x=>geocache[x.key]===undefined);
  for(const {city,prov,key} of uncached){
    await geocode(city,prov);
    await new Promise(res=>setTimeout(res,110));
    if(_pending) break;
  }

  // Remove old markers
  lmarkers.forEach(m=>lmap.removeLayer(m)); lmarkers=[];
  const sb=document.getElementById('map-sidebar'); sb.innerHTML='';

  let shown=0;
  for(const {r,i} of filtered){
    const city=r[3]||'',prov=r[5]||'',comarca=r[6]||'';
    if(!city)continue;
    const coord=geocache[city+'|'+prov];
    if(!coord)continue;
    if(!bounds.contains(coord))continue;
    shown++;

    const color=PROV_COLORS[prov]||'#1e5fa8';
    const jitter=(Math.random()-.5)*.005;
    const pos=[coord[0]+jitter,coord[1]+jitter];

    const marker=L.circleMarker(pos,{
      radius:7,fillColor:color,color:'white',weight:2,fillOpacity:.9
    }).addTo(lmap);

    marker.bindPopup(`
      <div class="pop-name">${r[0]}</div>
      ${prov?`<span class="pop-tag" style="background:${color}22;color:${color}">${prov}${comarca?' · '+comarca:''}</span>`:''}
      ${r[1]?`<div class="pop-row"><strong>Tel:</strong> ${r[1]}</div>`:''}
      ${r[2]?`<div class="pop-row"><strong>Email:</strong> ${r[2]}</div>`:''}
      <div class="pop-row"><strong>Ciudad:</strong> ${city}</div>
      ${r[1]?`<button class="pop-btn" onclick="window.location='tel:${r[1]}'">📞 Llamar</button>`:''}
    `,{maxWidth:250});

    lmarkers.push(marker);

    const d=document.createElement('div');
    d.className='map-item';
    d.innerHTML=`<div class="map-item-name">${r[0]}</div>
      <div class="map-item-loc" style="color:${color}">${prov}${comarca?' · '+comarca:''} · ${city}</div>`;
    d.onclick=()=>{
      lmap.setView(pos,14);marker.openPopup();
      document.querySelectorAll('.map-item').forEach(el=>el.classList.remove('active'));
      d.classList.add('active');
    };
    sb.appendChild(d);
  }

  const zoom=lmap.getZoom();
  const zMsg=zoom<7?'Acércate para ver empresas':zoom<9?'Vista nacional':zoom<11?'Vista regional':zoom<13?'Vista provincial':'Vista local';
  document.getElementById('map-hint').textContent=
    `${zMsg} · ${shown} empresa${shown!==1?'s':''} visibles · ${filtered.length} en filtro activo`;

  if(!sb.children.length)
    sb.innerHTML='<div class="map-item" style="color:var(--muted);font-size:12px;cursor:default">Sin empresas en esta zona — mueve o aleja el mapa</div>';

  _loading=false;
  if(_pending) loadVisibleMarkers();
}

// ── PROXIMITY SEARCH ──────────────────────────────────────────────────────
let proxMode     = false;
let proxOrigin   = null;  // {name, lat, lng}
let proxMarker   = null;  // origin marker on map
let proxCircle   = null;  // radius circle on map
let proxDistances= {};    // idx -> distance in km

// Haversine distance in km
function haversine(lat1,lng1,lat2,lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Build autocomplete list from dataset cities + company names
let proxSuggestions = [];
function buildProxSuggestions(){
  const cities = [...new Set(D.map(r=>r[3]).filter(Boolean))].sort();
  const companies = D.map(r=>r[0]).filter(Boolean);
  proxSuggestions = [...cities, ...companies];

  if(!matches.length){ dd.style.display='none'; return; }

function selectProxSuggestion(val){

async function doProxSearch(){
  document.getElementById('prox-dropdown').style.display='none';
  const query = document.getElementById('prox-query').value.trim();
  const km    = parseFloat(document.getElementById('prox-km').value) || 21;
  if(!query){ showToast('Escribe un cliente o ciudad de referencia'); return; }

  showToast('Buscando ubicación...');

  // 1. Try to find exact company in dataset
  const match = D.find(r=>r[0].toLowerCase()===query.toLowerCase());
  let originCity = match ? match[3] : query;
  let originProv = match ? match[5] : '';

  // 2. Geocode origin
  let coord = await geocode(originCity, originProv);
  if(!coord){
    // Try geocoding the query directly (might be a city name)
    coord = await geocode(query, prov||'');
  }
  if(!coord){
    showToast('⚠ No se pudo ubicar: ' + query);
    return;
  }

  proxOrigin = { name: query, lat: coord[0], lng: coord[1] };

  // 3. Geocode all companies and compute distances
  proxDistances = {};
  let geocoded = 0;
  const cityCache = {};

  for(let i=0;i<D.length;i++){
    const r = D[i];
    const city=r[3]||'',prov=r[5]||'';
    if(!city) continue;
    const ckey=city+'|'+prov;
    if(!cityCache[ckey]){
      let c = geocache[ckey];
      if(c===undefined){
        c = await geocode(city,prov);
        await new Promise(res=>setTimeout(res,80));
      }
      cityCache[ckey] = c;
    }
    const c = cityCache[ckey];
    if(!c) continue;
    geocoded++;
    const dist = haversine(proxOrigin.lat,proxOrigin.lng,c[0],c[1]);
    proxDistances[i] = dist;
  }

  // 4. Filter to those within radius
  proxMode = true;
  const nearby = Object.entries(proxDistances)
    .filter(([,d])=>d<=km)
    .map(([i,d])=>({i:+i,d}))
    .sort((a,b)=>a.d-b.d);

  // 5. Show results
  const banner = document.getElementById('prox-results-bar');
  banner.innerHTML = `<strong>${nearby.length} empresas</strong> a menos de <strong>${km} km</strong> de <strong>${query}</strong> · ordenadas por distancia`;
  banner.classList.add('show');
  document.getElementById('prox-clear-btn').style.display='';

  // 6. Override filtered with proximity order
  filtered = nearby.map(({i,d})=>({r:D[i],i,dist:d}));
  page=0;
  doRender();

  // 7. Show on map
  setView('map');
  showProxOnMap(coord, km, nearby);

  showToast(`✓ ${nearby.length} empresas en ${km} km`);
}

function showProxOnMap(origin, km, nearby){
  if(!lmap) initMap();

  // Remove previous proximity markers
  if(proxMarker){ lmap.removeLayer(proxMarker); proxMarker=null; }
  if(proxCircle){ lmap.removeLayer(proxCircle); proxCircle=null; }
  lmarkers.forEach(m=>lmap.removeLayer(m)); lmarkers=[];

  // Draw radius circle
  proxCircle = L.circle(origin, {
    radius: km*1000,
    color: '#e07b2a', weight: 2,
    fillColor: '#e07b2a', fillOpacity: .06,
    dashArray: '6,4'
  }).addTo(lmap);

  // Origin marker (pulsing)
  const originIcon = L.divIcon({
    className:'',
    html:`<div style="width:16px;height:16px;border-radius:50%;background:#e07b2a;border:3px solid white;box-shadow:0 2px 8px rgba(224,123,42,.6)"></div>`,
    iconSize:[16,16], iconAnchor:[8,8]
  });
  proxMarker = L.marker(origin, {icon:originIcon, zIndexOffset:1000})
    .addTo(lmap)
    .bindPopup(`<div class="pop-name">📍 ${proxOrigin.name}</div><div class="pop-row">Punto de referencia · radio ${km} km</div>`)
    .openPopup();

  // Place markers for nearby companies
  const sb = document.getElementById('map-sidebar');
  sb.innerHTML='';

  nearby.slice(0,80).forEach(({i,d})=>{
    const r=D[i];
    const city=r[3]||'',prov=r[5]||'',comarca=r[6]||'';
    const coord=geocache[city+'|'+prov];
    if(!coord)return;
    const jitter=(Math.random()-.5)*.003;
    const pos=[coord[0]+jitter,coord[1]+jitter];
    const color=PROV_COLORS[prov]||'#1e5fa8';
    const dStr=d<1?Math.round(d*1000)+'m':d.toFixed(1)+'km';
    const cls=d<7?'dist-near':d<15?'dist-mid':'dist-far';

    const marker=L.circleMarker(pos,{
      radius:8,fillColor:color,color:'white',weight:2,fillOpacity:.9
    }).addTo(lmap);

    marker.bindPopup(`
      <div class="pop-name">${r[0]} <span class="dist-badge ${cls}">${dStr}</span></div>
      ${prov?`<span class="pop-tag" style="background:${color}22;color:${color}">${prov}${comarca?' · '+comarca:''}</span>`:''}
      ${r[1]?`<div class="pop-row"><strong>Tel:</strong> ${r[1]}</div>`:''}
      ${r[2]?`<div class="pop-row"><strong>Email:</strong> ${r[2]}</div>`:''}
      <div class="pop-row"><strong>Ciudad:</strong> ${city} · <strong>${dStr}</strong></div>
      ${r[1]?`<button class="pop-btn" onclick="window.location='tel:${r[1]}'">📞 Llamar</button>`:''}
    `,{maxWidth:260});
    lmarkers.push(marker);

    const el=document.createElement('div');
    el.className='map-item';
    el.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="map-item-name">${r[0]}</div>
        <span class="dist-badge ${cls}">${dStr}</span>
      </div>
      <div class="map-item-loc" style="color:${color}">${prov}${comarca?' · '+comarca:''} · ${city}</div>`;
    el.onclick=()=>{
      lmap.setView(pos,14);marker.openPopup();
      document.querySelectorAll('.map-item').forEach(e=>e.classList.remove('active'));
      el.classList.add('active');
    };
    sb.appendChild(el);
  });

  // Fit to circle
  lmap.fitBounds(proxCircle.getBounds().pad(.05));
  document.getElementById('map-hint').textContent=
    `${nearby.length} empresas en ${km}km · naranja=origen · colores=provincia`;
}

function clearProx(){
  proxMode=false; proxOrigin=null; proxDistances={};
  document.getElementById('prox-query').value='';
  document.getElementById('prox-results-bar').classList.remove('show');
  document.getElementById('prox-clear-btn').style.display='none';
  if(proxMarker){lmap&&lmap.removeLayer(proxMarker);proxMarker=null;}
  if(proxCircle){lmap&&lmap.removeLayer(proxCircle);proxCircle=null;}
  doFilter();
}

// Patch doRender to show distance badge when in prox mode
const _origDoRender = doRender;
doRender = function(){
  if(!proxMode){ _origDoRender(); return; }

  const total=filtered.length;
  document.getElementById('res-count').textContent=total.toLocaleString('es')+' resultados';
  document.getElementById('hdr-count').textContent=total.toLocaleString('es')+' clientes';

  const slice=filtered.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  const tbody=document.getElementById('tbody');
  const empty=document.getElementById('empty');
  if(!slice.length){tbody.innerHTML='';empty.style.display='';renderPager();return;}
  empty.style.display='none';

  tbody.innerHTML=slice.map(({r,i,dist})=>{
    const prov=r[5]||'',color=PROV_COLORS[prov]||'#666';
    const tel=r[1]||'',email=r[2]||'';
    const dStr=dist<1?Math.round(dist*1000)+'m':dist.toFixed(1)+' km';
    const cls=dist<7?'dist-near':dist<15?'dist-mid':'dist-far';
    return `<tr>
      <td>
        <div class="c-name">${r[0]}<span class="dist-badge ${cls}">${dStr}</span></div>
        ${prov?`<div style="margin-top:3px"><span class="c-prov" style="background:${color}22;color:${color}">
          <span class="prov-dot" style="background:${color};width:6px;height:6px"></span>${prov}
        </span></div>`:''}
      </td>
      <td><div class="c-tel">${tel||'—'}</div></td>
      <td class="col-email"><div class="c-email">${email?`<a href="mailto:${email}">${email}</a>`:'—'}</div></td>
      <td><div class="c-city">${r[3]||'—'}</div></td>
      <td class="col-comarca"><div class="c-comarca">${r[6]||'—'}</div></td>
      <td>
        <div class="row-actions">
          ${tel?`<button class="ra ra-call" onclick="window.location='tel:${tel}'">📞</button>`:''}
          ${email?`<button class="ra ra-mail" onclick="window.location='mailto:${email}'">✉</button>`:''}
          <button class="ra ra-map" onclick="pinOnMap('${r[3].replace(/'/g,"\\'")}','${prov}')">📍</button>
        </div>
      </td>
    </tr>`;
  }).join('');
  renderPager();
};

// ── INIT ────────────────────────────────────────────────────────────────────
buildSidebar();
buildStats();
buildProxSuggestions();
doFilter();
</script>
</body>
